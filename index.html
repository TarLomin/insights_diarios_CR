<!DOCTYPE html>
<html>
<head>
  <title>Captura de demanda</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<img src="header.png" alt="Header" class="header-img">

<h2>Captura de demanda</h2>

<form id="form">

  <!-- Sucursal -->
  <select name="sucursal" required>
    <option value="" disabled selected>Selecciona sucursal</option>
    <option value="Huerta">Huerta</option>
    <option value="Americas">Americas</option>
    <option value="Leon">León</option>
  </select>

  <!-- Tipo -->
  <select name="tipo" required>
    <option value="" disabled selected>Selecciona tipo</option>
    <option value="no_tenemos">No tenemos</option>
    <option value="no_se_vende">No se vende</option>
  </select>

  <!-- SKU -->
  <input id="sku" name="sku" placeholder="SKU" required>

  <!-- FOTO -->
  <input type="file" id="foto" accept="image/*" capture="environment">

  <!-- PREVIEW -->
  <img id="preview" style="width:150px; display:none; margin-top:10px;">

  <br><br>

  <button type="submit">Enviar</button>

</form>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxpfXSIeimaslKjZp3WsoEcCujIEf_P9ZIqLIb0bRmpvxC2mN0SK6RccesQpbRniUwZ/exec";

// preview imagen
document.getElementById("foto").addEventListener("change", function(e){
  const file = e.target.files[0];
  if (file) {
    const preview = document.getElementById("preview");
    preview.src = URL.createObjectURL(file);
    preview.style.display = "block";
  }
});

// submit
document.getElementById("form").addEventListener("submit", async function(e){
  e.preventDefault();

  const sucursal = e.target.sucursal.value;
  const tipo = e.target.tipo.value;
  const sku = e.target.sku.value;
  const file = document.getElementById("foto").files[0];

  let base64 = "";
  let nombre = "";

  if (file) {
    const reader = new FileReader();

    reader.onload = async function () {
      base64 = reader.result.split(',')[1];
      nombre = file.name;

      await enviarDatos(sucursal, tipo, sku, base64, nombre);
    };

    reader.readAsDataURL(file);
  } else {
    await enviarDatos(sucursal, tipo, sku, "", "");
  }
});

async function enviarDatos(sucursal, tipo, sku, imagen, nombre) {

  await fetch(SCRIPT_URL, {
    method: "POST",
    body: JSON.stringify({
      sucursal: sucursal,
      tipo: tipo,
      sku: sku,
      imagen: imagen,
      nombre: nombre
    })
  });

  alert("Registro enviado");

  document.getElementById("form").reset();
  document.getElementById("preview").style.display = "none";
}
</script>

</body>
</html>

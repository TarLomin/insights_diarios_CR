<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Captura de demanda</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="favicon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<img src="header.png" class="header-img">

<h2>Captura de demanda</h2>

<form id="form">

  <!-- SUCURSAL -->
  <select name="sucursal" required>
    <option value="" disabled selected>Selecciona sucursal</option>
    <option value="Huerta">Huerta</option>
    <option value="Americas">Americas</option>
    <option value="Leon">León</option>
  </select>

  <!-- TIPO -->
  <select name="tipo" id="tipo" required>
    <option value="" disabled selected>Selecciona tipo</option>
    <option value="no_tenemos">No tenemos</option>
    <option value="no_se_vende">No se vende</option>
  </select>

  <!-- CATEGORIA -->
  <select name="categoria" required>
    <option value="" disabled selected>Selecciona categoria</option>
    <option value="Baño">Baño</option>
    <option value="Cocina">Cocina</option>
    <option value="Hogar">Hogar</option>
  </select>

  <!-- PRODUCTO -->
  <input id="producto" name="producto" placeholder="Producto">

  <!-- SKU -->
  <input id="sku" name="sku" placeholder="SKU">

  <!-- COMENTARIO -->
  <textarea name="comentario" placeholder="Comentario"></textarea>

  <!-- FOTO -->
  <input type="file" id="foto" accept="image/*" capture="environment">

  <img id="preview" style="width:150px; display:none; margin-top:10px;">

  <br><br>
  <button type="submit">Enviar</button>

</form>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw4ZfGZ7LzBzEtFTHzDE5S4ieyQMbVg-b2HINiMJbMXAC6HZdVk1-FIhxRA7QJ46a9w/exec";

const tipoSelect = document.getElementById("tipo");
const skuInput = document.getElementById("sku");
const productoInput = document.getElementById("producto");

// ===== LÓGICA DE NEGOCIO =====
tipoSelect.addEventListener("change", function() {
  const tipo = this.value;

  if (tipo === "no_se_vende") {
    skuInput.required = true;
    skuInput.style.display = "block";

    productoInput.required = false;
    productoInput.style.display = "none";
    productoInput.value = "";
  } else {
    skuInput.required = false;
    skuInput.style.display = "none";
    skuInput.value = "";

    productoInput.required = true;
    productoInput.style.display = "block";
  }
});

window.addEventListener("load", () => {
  tipoSelect.dispatchEvent(new Event("change"));
});

// ===== PREVIEW =====
document.getElementById("foto").addEventListener("change", function(e){
  const file = e.target.files[0];
  if (file) {
    const preview = document.getElementById("preview");
    preview.src = URL.createObjectURL(file);
    preview.style.display = "block";
  }
});

// ===== SUBMIT =====
document.getElementById("form").addEventListener("submit", async function(e){
  e.preventDefault();

  const data = {
    sucursal: e.target.sucursal.value,
    tipo: e.target.tipo.value,
    categoria: e.target.categoria.value,
    producto: e.target.producto.value,
    sku: e.target.sku.value,
    comentario: e.target.comentario.value
  };

  const file = document.getElementById("foto").files[0];

  if (file) {
    const reader = new FileReader();

    reader.onload = async function () {
      data.imagen = reader.result.split(',')[1];
      data.nombre = file.name;
      await enviar(data);
    };

    reader.readAsDataURL(file);
  } else {
    data.imagen = "";
    data.nombre = "";
    await enviar(data);
  }
});

async function enviar(data) {
  await fetch(SCRIPT_URL, {
    method: "POST",
    body: JSON.stringify(data)
  });

  alert("Registro enviado");

  document.getElementById("form").reset();
  document.getElementById("preview").style.display = "none";
}
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Captura de demanda</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<img src="header.png" class="header-img">

<h2>Captura de demanda</h2>

<form id="form">

  <!-- SUCURSAL -->
  <select name="sucursal" required>
    <option value="" disabled selected>Selecciona sucursal</option>
    <option value="Huerta">Huerta</option>
    <option value="Americas">Americas</option>
    <option value="Leon">León</option>
  </select>

  <!-- TIPO -->
  <select name="tipo" id="tipo" required>
    <option value="" disabled selected>Selecciona tipo</option>
    <option value="no_tenemos">No tenemos</option>
    <option value="no_se_vende">No se vende</option>
  </select>

  <!-- CATEGORIA -->
  <select name="categoria" required>
    <option value="" disabled selected>Selecciona categoria</option>
    <option value="Baño">Baño</option>
    <option value="Cocina">Cocina</option>
    <option value="Hogar">Hogar</option>
  </select>

  <!-- PRODUCTO -->
  <input id="producto" name="producto" placeholder="Producto">

  <!-- SKU -->
  <input id="sku" name="sku" placeholder="SKU">

  <!-- COMENTARIO -->
  <textarea name="comentario" placeholder="Comentario"></textarea>

  <!-- FOTO -->
  <input type="file" id="foto" accept="image/*" capture="environment">

  <img id="preview" style="width:150px; display:none; margin-top:10px;">

  <br><br>
  <button type="submit">Enviar</button>

</form>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzKOYyKi_qbCEUQmez9Oo2d2IdSb7bAGcrDHX563rlz_mkLjmSCyNBH7gpSb1bbkMnv/exec";

// ELEMENTOS
const form = document.getElementById("form");
const tipoSelect = document.getElementById("tipo");
const skuInput = document.getElementById("sku");
const productoInput = document.getElementById("producto");
const fileInput = document.getElementById("foto");

// LÓGICA SKU / PRODUCTO
tipoSelect.addEventListener("change", () => {
  const tipo = tipoSelect.value;

  if (tipo === "no_se_vende") {
    skuInput.style.display = "block";
    skuInput.required = true;

    productoInput.style.display = "none";
    productoInput.required = false;
    productoInput.value = "";
  } else {
    skuInput.style.display = "none";
    skuInput.required = false;
    skuInput.value = "";

    productoInput.style.display = "block";
    productoInput.required = true;
  }
});

tipoSelect.dispatchEvent(new Event("change"));

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  try {
    const formData = new FormData(form);

    let imagenBase64 = "";
    const file = fileInput.files[0];

    if (file) {
      const reader = new FileReader();

      imagenBase64 = await new Promise((resolve) => {
        reader.onload = () => resolve(reader.result.split(",")[1]);
        reader.readAsDataURL(file);
      });
    }

    const data = {
      sucursal: formData.get("sucursal"),
      tipo: formData.get("tipo"),
      categoria: formData.get("categoria"),
      producto: formData.get("producto"),
      sku: formData.get("sku"),
      comentario: formData.get("comentario"),
      imagen: imagenBase64
    };

    const res = await fetch(SCRIPT_URL, {
      method: "POST",
      body: JSON.stringify(data)
    });

    const text = await res.text();

    let result;
    try {
      result = JSON.parse(text);
    } catch {
      result = { status: "ok" };
    }

    if (result.status === "ok") {
      alert("Registro enviado");
      form.reset();
    } else {
      alert("Error: " + result.message);
    }

  } catch (err) {
    alert("Error en envío");
    console.error(err);
  }
});
</script>

</body>
</html>
